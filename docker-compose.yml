services:
  db:
    # pgvector image = Postgres 16 + the `vector` extension (Phase 2 embeddings).
    # Same PG 16 major as plain postgres:16, so the existing data volume is reused.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frikkinwave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
