name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector image so migrations can CREATE EXTENSION vector (Phase 2).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frikkinwave_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/frikkinwave_test
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -r requirements/base.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy apps/ config/
        continue-on-error: true  # Remove once stubs are fully configured

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest
